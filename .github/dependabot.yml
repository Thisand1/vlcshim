version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 5
    groups:
      dotnet-runtime-and-bcl:
        patterns:
          - "System.*"
          - "Microsoft.*"
      avalonia-stack:
        patterns:
          - "Avalonia*"
          - "SkiaSharp*"
          - "HarfBuzzSharp*"
      other-nuget:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/Bogota"
    open-pull-requests-limit: 3
